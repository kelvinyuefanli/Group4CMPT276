spring.application.name=smartcart

# --- Datasource (Postgres on Render) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smartcart}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:smartcart}
spring.datasource.password=${DATABASE_PASSWORD:}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Session (JDBC-backed) ---
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# --- Gemini AI ---
gemini.api.key=${GEMINI_API_KEY:AIzaSyDGAloEIsxkWPn2T8z3OWXPeAmnULoKhBg}
