spring.application.name=smartcart
server.port=${PORT:8080}

# --- Datasource (Postgres on Render) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smartcart}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:smartcart}
spring.datasource.password=${DATABASE_PASSWORD:}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Session (JDBC-backed) ---
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# --- Gemini AI ---
gemini.api.key=${GEMINI_API_KEY:}

# --- Instacart ---
instacart.api.key=${INSTACART_API_KEY:}
instacart.api.base-url=${INSTACART_API_BASE_URL:https://connect.dev.instacart.tools}
instacart.partner-linkback-url=${INSTACART_PARTNER_LINKBACK_URL:}
instacart.shopping-list.expires-in-days=${INSTACART_EXPIRES_IN_DAYS:14}
