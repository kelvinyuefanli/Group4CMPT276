# Local development profile -- uses H2 in-memory database
# Activate with:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

spring.datasource.url=jdbc:h2:mem:smartcart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

# Use Hibernate DDL instead of Flyway (V5 uses Postgres-specific ON CONFLICT syntax)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# Gemini -- override via GEMINI_API_KEY env var or .env file
gemini.api.key=${GEMINI_API_KEY:}

# Instacart -- defaults to the development host; override via env vars when testing
instacart.api.key=${INSTACART_API_KEY:}
instacart.api.base-url=${INSTACART_API_BASE_URL:https://connect.dev.instacart.tools}
instacart.partner-linkback-url=${INSTACART_PARTNER_LINKBACK_URL:}
instacart.shopping-list.expires-in-days=${INSTACART_EXPIRES_IN_DAYS:14}
