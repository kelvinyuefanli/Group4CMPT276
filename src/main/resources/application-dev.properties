# Local development profile -- uses H2 in-memory database
# Activate with:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

spring.datasource.url=jdbc:h2:mem:smartcart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Gemini -- override via GEMINI_API_KEY env var or .env file
gemini.api.key=${GEMINI_API_KEY:}
